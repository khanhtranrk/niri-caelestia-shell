# --- Niri Calestia Mpv Matugen Template ---

# Language and Theme
language=en
icon_theme=material
font=Inter

# OSC Behavior

# Turn live reload of mpv
live_reload=yes
# In seconds (e.g., 1, 0.5, 2.0)
live_reload_interval=1

window_top_bar=yes
window_title=no
hidetimeout=2000
fadeduration=600
fadein=yes
bottomhover=yes
bottomhover_zone=100
osc_on_seek=yes
osc_keep_with_cursor=yes
tooltip_text_color=#c6c6c6
tooltip_font_size=14

# Menu window
menu_bg_color=#0e0e0e
menu_fg_color=#c6c6c6
menu_alpha=40
menu_border_radius=12
menu_padding=16 20
menu_sel_color=#90cdff
menu_sel_bg_color=#004b71
menu_sel_fg_color=#cbe6ff
menu_sel_bg_alpha=60
menu_sel_bg_radius=4
menu_sel_padding=0 8

# Scaling
vidscale=no
scalewindowed=0.9
scalefullscreen=1.0

# Layout & Visibility 
show_title=yes
title=${media-title}
title_font_size=22
show_chapter_title=yes
chapter_fmt=— %s
timetotal=yes
time_format=dynamic

# Elements Display 
jump_buttons=yes
jump_amount=10
chapter_skip_buttons=no
track_nextprev_buttons=yes
volume_control=yes
volume_control_type=linear
playlist_button=no
hide_empty_playlist_button=yes
speed_button=yes
speed_button_scroll=0.25
loop_button=yes
fullscreen_button=yes
info_button=no
ontop_button=no
screenshot_button=yes
download_button=yes

# Background
osc_color=#0e0e0e
window_fade_alpha=0
fade_alpha=95
fade_blur_strength=0
fade_transparency_strength=60
fadeduration=200

# Seekbar & Progress
seek_handle_size=0.8
nibbles_style=bar
persistentprogress=no
seekbarfg_color=#90cdff
seekbarbg_color=#004b71
seekbar_cache_color=#90cdff
volumebar_match_seek_color=yes

# Title and Time
title_height=120
chapter_title_height=95
title_color=#ffffff
time_color=#c6c6c6
chapter_title_color=#ffffff

# Disabled titlebar button
title_mbtn_left_command=
title_mbtn_mid_command=
title_mbtn_left_command=

# Thumbnail
thumbnail_border=2
thumbnail_border_radius=0
thumbnail_border_color=#004b71
thumbnail_border_outline=#004b71

# Button Colors
windowcontrols_close_hover=#ffb4ab
windowcontrols_max_hover=#90cdff
windowcontrols_min_hover=#90cdff

playpause_color=#90cdff
middle_buttons_color=#e2e2e2
side_buttons_color=#c6c6c6

hover_effect=size,color
hover_button_size=115
hover_effect_color=#90cdff

# Button 1 - show-playlist
usr_btn_1_icon= 󰷐
usr_btn_1_tooltip=playlist
usr_btn_1_mbtn_left_command=run "/bin/bash" "-c" "bash ~/.config/mpv/script-opts/show_playlist.sh"
usr_btn_1_mbtn_right_command=
usr_btn_1_mbtn_mid_command=

# Button 2 - subtitle-menu
usr_btn_2_icon= 
usr_btn_2_tooltip=subtitles
usr_btn_2_mbtn_left_command=script-message-to niri_caelestia menu-toggle sub; script-message-to niri_caelestia osc-hide
usr_btn_2_mbtn_right_command=cycle sub
usr_btn_2_mbtn_mid_command=cycle sub down
